name: Day 45 Tasks

on:
    push:
        branches: [main]
jobs:
    Build_image:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker Image
              run: |
                docker build -t my-app-image:latest .
                docker images

              

